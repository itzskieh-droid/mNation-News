name: Build and Deploy mNation News
on:
  push:
    branches:
      - main  # Build whenever you push to your main branch
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2' # Standard version for Jekyll 4+
          bundler-cache: true # Faster builds by caching your Gemfile

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site # The folder where Jekyll puts your finished website
          branch: gh-pages # Where your live website files will live
